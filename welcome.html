<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-warm: #ff6b35;
            --secondary-warm: #f7b32b;
            --accent-red: #c41e3a;
            --dark-bg: #1a1a2e;
            --dark-accent: #16213e;
            --text-light: #ffffff;
            --text-muted: #b0b0b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #533483 75%, #25009e 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        /* Animated particles background */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(49, 5, 222, 0.8), rgba(255,107,53,0));
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) scale(0);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .welcome-section {
            margin-bottom: 60px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-text {
            font-size: 18px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .welcome-name {
            font-size: 72px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b35 0%, #f7b32b 50%, #ff6b35 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            text-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
        }

        .shortcuts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 30px;
            max-width: 700px;
            margin: 0 auto;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            animation: scaleIn 0.5s ease-out backwards;
        }

        .shortcut:nth-child(1) { animation-delay: 0.3s; }
        .shortcut:nth-child(2) { animation-delay: 0.4s; }
        .shortcut:nth-child(3) { animation-delay: 0.5s; }
        .shortcut:nth-child(4) { animation-delay: 0.6s; }
        .shortcut:nth-child(5) { animation-delay: 0.7s; }
        .shortcut:nth-child(6) { animation-delay: 0.8s; }
        .shortcut:nth-child(7) { animation-delay: 0.9s; }
        .shortcut:nth-child(8) { animation-delay: 1s; }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.5) rotate(-20deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .icon-circle::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .shortcut:hover .icon-circle::before {
            left: 100%;
        }

        .shortcut:hover .icon-circle {
            transform: translateY(-15px) scale(1.15);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.5);
        }

        .shortcut-label {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .shortcut:hover .shortcut-label {
            opacity: 1;
        }

        /* Individual icon colors */
        .gmail { background: linear-gradient(135deg, #EA4335, #D33F2D); color: white; }
        .instagram { background: linear-gradient(135deg, #E1306C, #C13584); color: white; }
        .portofolio { background: linear-gradient(135deg, #0581e7, #7f00c3); color: rgb(255, 0, 0); }
        /* Responsive */
        @media (max-width: 768px) {
            .welcome-name {
                font-size: 48px;
            }

            .shortcuts-container {
                gap: 20px;
                max-width: 100%;
                padding: 0 20px;
            }

            .icon-circle {
                width: 70px;
                height: 70px;
                font-size: 30px;
            }

            .shortcut:hover .icon-circle {
                transform: translateY(-10px) scale(1.1);
            }
        }

        /* Add shortcut button */
        .add-shortcut {
            background: var(--dark-accent);
            color: var(--text-light);
            border: 2px dashed var(--primary-warm);
            cursor: pointer;
            font-size: 36px;
            transition: all 0.3s ease;
        }

        .add-shortcut:hover {
            border-color: var(--secondary-warm);
            background: rgba(255, 107, 53, 0.1);
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: var(--text-muted);
            font-size: 12px;
            z-index: 5;
        }

        .theme-credit {
            color: var(--primary-warm);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .theme-credit:hover {
            color: var(--secondary-warm);
        }
    </style>
</head>
<body>
    <!-- Particle Animation -->
    <div class="particles" id="particlesContainer"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="welcome-section">
            <h1 class="welcome-name">Welcome</h1>
        </div>

        <div class="shortcuts-container">
            <!-- Gmail -->
            <a href="https://gmail.com" class="shortcut" title="Gmail">
                <div class="icon-circle gmail">
                    <i class="fas fa-envelope"></i>
                </div>
                <span class="shortcut-label">Gmail</span>
            </a>
           <!-- Portfolio -->
            <a href="web_perkenalan.html" class="shortcut" title="Portfolio">
                <div class="icon-circle portfolio">
                     <i class="fas fa-briefcase"></i>
                </div>
                <span class="shortcut-label">Portfolio</span>
            </a>
        </div>
        <!-- Instagram -->
            <a href="https://www.instagram.com/inithomas_/" class="shortcut" title="instagram">
                <div class="icon-circle instagram">
                    <i class="fab fa-instagram"></i>
                </div>
                <span class="shortcut-label">Instagram</span>
            </a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Dashboard by <span class="theme-credit">Thomas</span>
    </div>

    <script>
        // Generate animated particles
        function createParticles() {
            const container = document.getElementById('particlesContainer');
            const particleCount = 15;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                const size = Math.random() * 100 + 30;
                const left = Math.random() * window.innerWidth;
                const duration = Math.random() * 8 + 8;
                const delay = Math.random() * 5;

                particle.style.left = left + 'px';
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = delay + 's';

                container.appendChild(particle);

                // Recreate particle when animation ends
                particle.addEventListener('animationend', () => {
                    particle.remove();
                    createParticles();
                });
            }
        }

        // Initialize particles on load
        createParticles();

        // Add click feedback
        document.querySelectorAll('.shortcut').forEach(shortcut => {
            shortcut.addEventListener('click', function(e) {
                const circle = this.querySelector('.icon-circle');
                circle.style.animation = 'none';
                setTimeout(() => {
                    circle.style.animation = '';
                }, 10);
            });
        });

        // Keyboard navigation
        let currentIndex = 0;
        const shortcuts = document.querySelectorAll('.shortcut');

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                currentIndex = (currentIndex + 1) % shortcuts.length;
                shortcuts[currentIndex].focus();
            } else if (e.key === 'ArrowLeft') {
                currentIndex = (currentIndex - 1 + shortcuts.length) % shortcuts.length;
                shortcuts[currentIndex].focus();
            } else if (e.key === 'Enter' && document.activeElement.classList.contains('shortcut')) {
                document.activeElement.click();
            }
        });
    </script>
</body>
</html>
